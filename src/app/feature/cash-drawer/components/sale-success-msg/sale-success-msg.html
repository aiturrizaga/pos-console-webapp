<div class="flex flex-col items-center px-4 py-10 gap-6">

  <svg class="w-44 h-44" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect x="30" y="10" width="100" height="130" rx="6" fill="#EAF3DE" stroke="#639922" stroke-width="1"/>
    <rect x="42" y="28" width="56" height="6" rx="3" fill="#97C459"/>
    <rect x="42" y="42" width="76" height="4" rx="2" fill="#C0DD97"/>
    <rect x="42" y="52" width="60" height="4" rx="2" fill="#C0DD97"/>
    <rect x="42" y="62" width="70" height="4" rx="2" fill="#C0DD97"/>
    <line x1="42" y1="76" x2="118" y2="76" stroke="#97C459" stroke-width="0.8" stroke-dasharray="3 2"/>
    <rect x="42" y="84" width="40" height="4" rx="2" fill="#C0DD97"/>
    <rect x="84" y="84" width="34" height="4" rx="2" fill="#639922"/>
    <rect x="42" y="94" width="36" height="4" rx="2" fill="#C0DD97"/>
    <rect x="84" y="94" width="34" height="4" rx="2" fill="#639922"/>
    <line x1="42" y1="108" x2="118" y2="108" stroke="#97C459" stroke-width="0.8"/>
    <rect x="60" y="116" width="60" height="6" rx="3" fill="#27500A"/>
    <path d="M30 140 L40 150 L30 160" fill="#EAF3DE" stroke="#639922" stroke-width="1" stroke-linejoin="round"/>
    <path d="M130 140 L120 150 L130 160" fill="#EAF3DE" stroke="#639922" stroke-width="1" stroke-linejoin="round"/>
    <circle cx="138" cy="48" r="26" fill="#EAF3DE" stroke="#3B6D11" stroke-width="1.5"/>
    <circle cx="138" cy="48" r="20" fill="#639922"/>
    <path d="M128 48 L135 55 L149 40" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"
          fill="none"/>
  </svg>

  <div class="text-center">
    <p class="text-xl font-medium text-gray-900 dark:text-white">¡Venta completada!</p>
    <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">El pago fue procesado correctamente.</p>
  </div>

  <div class="flex flex-col gap-3 w-full max-w-xs">
    <button
      type="button"
      (click)="print.emit()"
      class="cursor-pointer flex items-center justify-center gap-2 w-full py-2.5 px-4 rounded-lg border border-gray-200 dark:border-gray-700 text-sm font-medium text-gray-700 dark:text-gray-200 hover:bg-gray-50 dark:hover:bg-gray-800 transition-colors"
    >
      <i class="ti ti-printer text-base"></i>
      Imprimir recibo
    </button>

    <div class="flex gap-2">
      <input
        type="email"
        [(ngModel)]="email"
        placeholder="correo@ejemplo.com"
        class="flex-1 px-3 py-2 text-sm rounded-lg border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-purple-500"
      />
      <button
        type="button"
        (click)="onSendEmail()"
        class="px-4 py-2 text-sm font-medium rounded-lg bg-purple-600 hover:bg-purple-700 text-white transition-colors"
      >
        Enviar
      </button>
    </div>
  </div>

</div>
